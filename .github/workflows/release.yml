name: Release

on:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release needs write access to create the release + upload files.
permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore GroupTasker.sln

      - name: Build
        run: dotnet build GroupTasker.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GroupTasker.sln --configuration Release --no-build --verbosity normal

      - name: Publish self-contained
        run: |
          dotnet publish src/GroupTasker.UI/GroupTasker.UI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --no-build `
            -o ./publish/GroupTasker-self-contained
          dotnet publish src/GroupTasker.Launcher/GroupTasker.Launcher.csproj `
            --configuration Release `
            --no-restore `
            --no-build `
            -o ./publish/GroupTasker-self-contained

      - name: Publish framework-dependent
        run: |
          dotnet publish src/GroupTasker.UI/GroupTasker.UI.csproj `
            --configuration Release `
            --runtime win-x64 `
            --no-self-contained `
            --no-restore `
            --no-build `
            -o ./publish/GroupTasker-fxdep
          dotnet publish src/GroupTasker.Launcher/GroupTasker.Launcher.csproj `
            --configuration Release `
            --no-restore `
            --no-build `
            -o ./publish/GroupTasker-fxdep

      - name: Package zips
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path ./publish/GroupTasker-self-contained/* -DestinationPath "./publish/GroupTasker-$tag-win-x64.zip" -Force
          Compress-Archive -Path ./publish/GroupTasker-fxdep/* -DestinationPath "./publish/GroupTasker-$tag-fxdep-win-x64.zip" -Force
          Get-FileHash "./publish/GroupTasker-$tag-win-x64.zip" -Algorithm MD5 | ForEach-Object { Set-Content -Path "./publish/GroupTasker-$tag-win-x64.zip.md5" -Value ($_.Hash.ToLower() + "  GroupTasker-$tag-win-x64.zip") }
          Get-FileHash "./publish/GroupTasker-$tag-fxdep-win-x64.zip" -Algorithm MD5 | ForEach-Object { Set-Content -Path "./publish/GroupTasker-$tag-fxdep-win-x64.zip.md5" -Value ($_.Hash.ToLower() + "  GroupTasker-$tag-fxdep-win-x64.zip") }

      - name: Extract release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $changelog = Get-Content "CHANGELOG.md" -Raw
          $escaped = [regex]::Escape($version)
          $pattern = '(?ms)^## \[' + $escaped + '\][^\n]*\n(.*?)(?=^## \[|\z)'
          $match = [regex]::Match($changelog, $pattern)
          if ($match.Success) {
            $match.Groups[1].Value.Trim() | Out-File -FilePath release-notes.md -Encoding utf8
          } else {
            $fallback = "## What's changed`n`nFull changelog: see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md)."
            $fallback | Out-File -FilePath release-notes.md -Encoding utf8
          }
          Write-Host "::notice::Release notes written to release-notes.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GroupTasker ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            ./publish/GroupTasker-${{ github.ref_name }}-win-x64.zip
            ./publish/GroupTasker-${{ github.ref_name }}-win-x64.zip.md5
            ./publish/GroupTasker-${{ github.ref_name }}-fxdep-win-x64.zip
            ./publish/GroupTasker-${{ github.ref_name }}-fxdep-win-x64.zip.md5
